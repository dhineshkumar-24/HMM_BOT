project:
  name: "HMM Adaptive Trading Bot"
  version: "2.0.0"
  magic_number: 234567


mtf:
  bias_tf:    "H4"    # 4H trend direction
  regime_tf:  "H1"    # 1H HMM input
  signal_tf:  "M15"   # 15M alpha signal
  entry_tf:   "M1"    # 1M execution
  bias_ema_fast: 50
  bias_ema_slow: 200

trading:
  symbol: "EURUSD"
  timeframe: "M5"
  risk_per_trade: 0.01          # 1 % per trade
  max_daily_drawdown_pct: 0.03   # 3% (legacy key — also in risk:)
  max_total_drawdown_pct: 0.15   # 15% (legacy key)
  risk_reward_ratio: 2.0
  leverage: 100

# ── Strategy Parameters ───────────────────────────────────────────────────────
strategy:
  # Shared
  rsi_period: 14
  atr_period: 14
  adx_period: 10
  vwap_window: 21
  hurst_threshold: 0.45

  alpha:
    threshold_percentile: 80
    tp_vol_mult: 6.0
    sl_vol_mult: 3.0
    min_edge_pips: 0.00020
    min_combined_score: 1.80 

  # Mean Reversion (Asian + MEAN_REVERT regime)
  mean_reversion:
    z_score_trigger: 2.0         # |Z| >= this to consider entry
    z_score_exit: 0.0            # Z returns here → TP = rolling mean
    rsi_overbought: 72           # RSI must exceed this for SELL
    rsi_oversold: 28             # RSI must be below this for BUY
    ema_slope_flat: 0.00005      # |EMA50 slope| must be <= this (flat)
    adx_max: 18                  # ADX must be < this (no strong trend)
    sl_atr_mult: 2.0             # SL = ATR * sl_atr_mult
    trail_atr_mult: 1.5          # Trailing stop = ATR * trail_atr_mult
    min_rr: 1.3

  # Momentum (London/NY + TRENDING regime)
  momentum:
    adx_min: 25                  # ADX must be >= this (trending)
    ema_fast: 21                  # Fast EMA for trend direction
    ema_slow: 100                 # Slow EMA for baseline trend
    rsi_trend_low: 45            # RSI long filter (> 40 for BUY)
    rsi_trend_high: 55           # RSI short filter (< 60 for SELL)
    sl_atr_mult: 5.0             # SL = ATR * sl_atr_mult
    tp_atr_mult: 10.0             # TP = ATR * tp_atr_mult
    trail_atr_mult: 3.0          # Trailing stop = ATR * trail_atr_mult

# ── Session Windows (broker candle time) ─────────────────────────────────────
sessions:
  asian_start: "02:00"
  asian_end: "09:00"
  london_start: "09:00"
  london_end: "12:00"
  london_mid_start: "13:00"      # Kept for legacy helper function
  london_mid_end: "15:00"
  newyork_start: "14:00"
  newyork_end: "21:00"

filters:
  max_spread_pips: 2.0
  min_volatility_percentile: 0.2 #Minimum volatility percentile 
  max_volatility_percentile: 0.8 #Maximum volatility percentile

execution:
  order_comment: "HMM Bot"
  slippage_pips: 2 #Maximum price difference allowed between requested price and executed price.
  deviation: 20 #allowing the slippage 2*10 = 20 pips

# ── Date-Based Backtesting ────────────────────────────────────────────────────
backtest:
  start_date:   "2020-01-24"      # Format: YYYY-MM-DD
  end_date:     "2026-01-01"      # Format: YYYY-MM-DD
  train_split:  0.70              # 70% train, 30% test
  cache_dir:    "data/cache"      # Where to store Parquet cache files
  force_refetch: false            # Set true to ignore cache and re-fetch

# ── Risk Management ──────────────────────────────────────────────────────────
risk:
  risk_per_trade: 0.01            # 1% risk per trade
  max_daily_drawdown_pct: 0.03     # 3%  — disable today
  max_account_drawdown_pct: 0.15   # 15% — permanent shutdown
  max_consecutive_losses: 2        # Disable day after 2 SLs in a row

# ── HMM Regime Detection ──────────────────────────────────────────────────────
hmm:
  n_components: 3 # Number of regimes
  n_iter: 150 # Number of iterations for training - Expectation-Maximization (EM
  covariance_type: "full" # Type of covariance matrix
  confidence_threshold: 0.70 # Confidence threshold for regime detection
  regime_names:
    0: "mean_reverting"
    1: "trending"
    2: "high_volatility"
  model_path: "models/hmm.pkl"
  feature_lookback: 6000 # Number of bars to look back for feature extraction
  retrain_interval: 1500 # Number of bars to look back for feature extraction new candles
