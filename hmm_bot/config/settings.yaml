project:
  name: "HMM Adaptive Trading Bot"
  version: "5.0.0"
  magic_number: 234567


mtf:
  bias_tf:    "H4"
  regime_tf:  "H1"
  signal_tf:  "M15"
  entry_tf:   "M1"
  bias_ema_fast: 50
  bias_ema_slow: 200

trading:
  symbol: "EURUSD"
  timeframe: "M5"
  risk_per_trade: 0.005          # v5.0: halved from 1% → 0.5% (precision sizing)
  max_daily_drawdown_pct: 0.02   # v5.0: tighter 2% daily (was 3%)
  max_total_drawdown_pct: 0.15
  risk_reward_ratio: 2.0
  leverage: 100

# ── Strategy Parameters ───────────────────────────────────────────────────────
strategy:
  # Shared indicator periods
  rsi_period: 14
  atr_period: 14
  adx_period: 10
  vwap_window: 21
  vwap_window_slow: 50
  hurst_threshold: 0.45

  alpha:
    threshold_percentile: 70
    tp_vol_mult: 6.0
    sl_vol_mult: 4.5
    min_sl_pips: 0.00150         # v5.0: 15-pip floor (was 10)
    min_edge_pips: 0.00015
    min_combined_score: 1.50
    combined_threshold: 0.40

  # Mean Reversion — v5.0: wider SL, achievable TP
  mean_reversion:
    z_score_trigger: 2.0         # v5.0: raised from 1.8 → 2.0 (higher conviction)
    z_slow_trigger: 1.2          # v5.0: raised from 1.0 → 1.2
    z_score_exit: 0.0
    rsi_overbought: 65           # v5.0: was 60 → 65 (need stronger signal)
    rsi_oversold:   35           # v5.0: was 40 → 35
    ema_slope_flat: 0.0005
    adx_max: 22                  # v5.0: tighter from 25 → 22 (must be truly ranging)
    sl_atr_mult: 2.5
    min_sl_pips: 0.00150         # v5.0: 15-pip floor!!! (was 10 → 86% SL hit)
    max_sl_pips: 0.00350         # 35-pip ceiling
    trail_atr_mult: 1.8
    min_rr: 2.0                  # v5.0: strict 1:2 minimum
    min_tp_atr_mult: 3.0         # v5.0: raised from 2.0 → 3.0
    bar_confirm: true
    cooling_bars: 6              # v5.0: longer from 4 → 6
    ou_max_half_life: 50         # v5.0: relaxed from 40 → 50
    min_atr_ratio: 0.6           # v5.0 NEW: anti-noise filter

  # Momentum — v5.0: precision entries, wider SL, achievable TP
  momentum:
    adx_min: 22                  # v5.0: raised from 20 → 22
    di_separation: 5             # v5.0 NEW: min gap between DI+ and DI-
    ema_period_fast: 21
    ema_period_slow: 50
    ema_period_base: 100
    rsi_overbought: 70           # v5.0 NEW: don't chase overextended
    rsi_oversold: 30
    min_rr: 2.0                  # v5.0: strict 1:2 minimum

    # SL/TP — v5.0: WIDER SL above noise, achievable TP
    sl_atr_mult: 2.0             # ~15-20 pips on EURUSD M5
    tp_atr_mult: 4.0             # ~30-40 pips
    trail_atr_mult: 2.5
    min_sl_pips: 0.00150         # v5.0: 15-pip floor!!! (was 10 → killed us)
    max_sl_pips: 0.00400         # 40-pip ceiling
    cooling_bars: 6              # v5.0: longer from 3 → 6
    min_atr_ratio: 0.6           # v5.0 NEW: skip low-vol noise periods

    # Momentum thresholds — v5.0: higher bar for entry
    mom_threshold: 1.5           # v5.0: raised from 1.0 → 1.5
    mom_trend_threshold: 1.2     # lower in confirmed trending regime

    breakeven_atr: 1.0

  # Signal Quality Gate — v5.0: higher bar
  signal:
    min_gap: 0.50                # v5.0: raised from 0.40 → 0.50
    cooling_bars: 6

# ── Session Windows (broker candle time) ─────────────────────────────────────
sessions:
  asian_start:    "02:00"
  asian_end:      "09:00"
  london_start:   "09:00"
  london_end:     "12:00"
  newyork_start:  "12:00"
  newyork_end:    "21:00"

filters:
  max_spread_pips: 2.0
  min_volatility_percentile: 0.15
  max_volatility_percentile: 0.85

execution:
  order_comment: "HMM Bot"
  slippage_pips: 2
  deviation: 20

# ── Date-Based Backtesting ────────────────────────────────────────────────────
backtest:
  start_date:   "2020-01-24"
  end_date:     "2026-01-01"
  train_split:  0.70
  cache_dir:    "data/cache"
  force_refetch: false

# ── Risk Management — v5.0: tighter controls ─────────────────────────────────
risk:
  risk_per_trade: 0.005          # v5.0: 0.5% risk per trade (was 1%)
  max_daily_drawdown_pct: 0.02   # v5.0: 2% daily max (was 3%)
  max_account_drawdown_pct: 0.15
  max_consecutive_losses: 2      # v5.0: strict 2-loss limit → stop for day
  var_confidence: 0.95

# ── HMM Regime Detection ──────────────────────────────────────────────────────
hmm:
  n_components: 3
  n_iter: 300
  covariance_type: "full"
  confidence_threshold: 0.65
  min_confidence_trade: 0.60
  regime_names:
    0: "mean_reverting"
    1: "trending"
    2: "high_volatility"
  model_path: "models/hmm.pkl"
  feature_lookback: 40000
  retrain_interval: 8000
