project:
  name: "HMM Adaptive Trading Bot"
  version: "5.0.0"
  magic_number: 234567


mtf:
  bias_tf:    "H4"
  regime_tf:  "H1"
  signal_tf:  "M15"
  entry_tf:   "M1"
  bias_ema_fast: 50
  bias_ema_slow: 200

trading:
  symbol: "EURUSD"
  timeframe: "M5"
  risk_per_trade: 0.005          # v5.0: halved from 1% → 0.5% (precision sizing)
  max_daily_drawdown_pct: 0.02   # v5.0: tighter 2% daily (was 3%)
  max_total_drawdown_pct: 0.15
  risk_reward_ratio: 2.0
  leverage: 100

# ── Strategy Parameters ───────────────────────────────────────────────────────
strategy:
  # Shared indicator periods
  rsi_period: 14
  atr_period: 14
  adx_period: 10
  vwap_window: 21
  vwap_window_slow: 50
  hurst_threshold: 0.45

  alpha:
    threshold_percentile: 65
    tp_vol_mult: 0.5             # Ultra Scalp TP
    sl_vol_mult: 2.0             # Normal SL to avoid 60-pip massacres
    min_sl_pips: 0.00060         # 6-pip floor
    min_edge_pips: 0.00015
    min_combined_score: 1.50
    combined_threshold: 0.40
    mr_mom_filter: 1.5           
    trend_pullback: 0.5          

  # Mean Reversion — v5.0: wider SL, achievable TP
  mean_reversion:
    z_score_trigger: 2.0      # Less extreme Z to actually catch bounces
    z_slow_trigger: 1.2
    z_score_exit: 0.0
    rsi_overbought: 65
    rsi_oversold:   35
    ema_slope_flat: 0.0005
    adx_max: 22
    sl_atr_mult: 2.5
    min_sl_pips: 0.00100
    max_sl_pips: 0.00200
    trail_atr_mult: 1.8
    min_rr: 1.5                  # Loosen RR constraint to allow more trades
    min_tp_atr_mult: 3.0
    bar_confirm: true
    cooling_bars: 6
    ou_max_half_life: 30
    min_atr_ratio: 1.0

  # Momentum — v5.0: precision entries, wider SL, achievable TP
  momentum:
    adx_min: 18
    di_separation: 10
    ema_period_fast: 21
    ema_period_slow: 50
    ema_period_base: 100
    rsi_overbought: 60
    rsi_oversold: 40
    min_rr: 1.7                 # Loosen strict RR

    # SL/TP
    sl_atr_mult: 2.5
    tp_atr_mult: 6.0
    trail_atr_mult: 2.5
    min_sl_pips: 0.00100
    max_sl_pips: 0.00200
    cooling_bars: 6
    min_atr_ratio: 1.0

    # Momentum thresholds
    mom_threshold: 2.3          # Allow slightly earlier entries
    mom_trend_threshold: 2.5

    breakeven_atr: 1.5

  # Signal Quality Gate — v5.0: higher bar
  signal:
    min_gap: 0.50                # v5.0: raised from 0.40 → 0.50
    cooling_bars: 6

# ── Session Windows (broker candle time) ─────────────────────────────────────
sessions:
  asian_start:    "02:00"
  asian_end:      "09:00"
  london_start:   "09:00"
  london_end:     "12:00"
  newyork_start:  "12:00"
  newyork_end:    "21:00"

filters:
  max_spread_pips: 2.0
  min_volatility_percentile: 0.20
  max_volatility_percentile: 0.80

execution:
  order_comment: "HMM Bot"
  slippage_pips: 2
  deviation: 20

# ── Date-Based Backtesting ────────────────────────────────────────────────────
backtest:
  start_date:   "2020-01-24"
  end_date:     "2026-01-01"
  train_split:  0.70
  cache_dir:    "data/cache"
  force_refetch: false

# ── Risk Management — v5.0: tighter controls ─────────────────────────────────
risk:
  risk_per_trade: 0.005          # v5.0: 0.5% risk per trade (was 1%)
  max_daily_drawdown_pct: 0.02   # v5.0: 2% daily max (was 3%)
  max_account_drawdown_pct: 0.15
  max_consecutive_losses: 2      # v5.0: strict 2-loss limit → stop for day
  var_confidence: 0.95

# ── HMM Regime Detection ──────────────────────────────────────────────────────
hmm:
  n_components: 3
  n_iter: 300
  covariance_type: "full"
  confidence_threshold: 0.65
  min_confidence_trade: 0.60
  regime_names:
    0: "mean_reverting"
    1: "trending"
    2: "high_volatility"
  model_path: "models/hmm.pkl"
  feature_lookback: 60000
  retrain_interval: 10000
