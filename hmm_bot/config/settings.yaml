project:
  name: "HMM Adaptive Trading Bot"
  version: "5.0.0"
  magic_number: 234567


mtf:
  bias_tf:    "H4"
  regime_tf:  "H1"
  signal_tf:  "M15"
  entry_tf:   "M1"
  bias_ema_fast: 50
  bias_ema_slow: 200

trading:
  symbol: "EURUSD"
  timeframe: "H1"
  risk_per_trade: 0.01           # 1% per trade
  max_daily_drawdown_pct: 0.02   # v5.0: tighter 2% daily (was 3%)
  max_total_drawdown_pct: 0.15
  risk_reward_ratio: 2.0

# ── Strategy Parameters ───────────────────────────────────────────────────────
strategy:
  # Shared indicator periods
  rsi_period: 14
  atr_period: 14
  adx_period: 10
  vwap_window: 21
  vwap_window_slow: 50
  atr_avg_window: 50         # NEW: moving average window for ATR
  ou_window: 60              # NEW: OU half-life calculation window
  slope_window: 5            # NEW: window for calculating EMA slopes
  hurst_threshold: 0.45

  alpha:
    threshold_percentile: 65
    tp_vol_mult: 2.0             # H1 targets 2.0x ATR cleanly
    sl_vol_mult: 1.5             # 1.5x ATR stops
    min_sl_pips: 0.00150         # 15-pip floor for safe execution
    min_edge_pips: 0.00015
    min_combined_score: 1.50
    combined_threshold: 0.40
    # NEW: Alpha feature lookback windows
    vol_fast: 10
    vol_slow: 50
    z_window: 20
    mom_fast: 5
    mom_slow: 20
    mom_long: 60

  # Mean Reversion
  mean_reversion:
    ema_period: 50               # NEW: EMA period for flat check
    z_score_trigger: 2.0         # v5.0: raised from 1.8 → 2.0 (higher conviction)
    z_slow_trigger: 1.2          # v5.0: raised from 1.0 → 1.2
    z_score_exit: 0.0
    rsi_overbought: 65           # v5.0: was 60 → 65 (need stronger signal)
    rsi_oversold:   35           # v5.0: was 40 → 35
    ema_slope_flat: 0.0005
    adx_max: 20
    sl_atr_mult: 2.0             # Fat stop loss to endure noise
    min_sl_pips: 0.00150
    max_sl_pips: 0.00400
    trail_atr_mult: 1.5
    min_rr: 1.0                  # Allow sub-1RR to guarantee high win rate scalps
    min_tp_atr_mult: 1.5         # Extremely conservative TP target
    bar_confirm: true
    cooling_bars: 3
    ou_max_half_life: 40
    min_atr_ratio: 0.8

  # Momentum
  momentum:
    adx_min: 15                  # Pick up momentum earlier
    di_separation: 8
    ema_period_fast: 20
    ema_period_slow: 50
    ema_period_base: 200
    rsi_overbought: 70           # Give momentum room to run
    rsi_oversold: 30
    min_rr: 1.0

    # SL/TP
    sl_atr_mult: 1.5             # Fat stop
    tp_atr_mult: 2.0             # Achievable TP (1.5 ATR is approx 20 pips on M15)
    trail_atr_mult: 1.5          # Aggressive trail
    min_sl_pips: 0.00150
    max_sl_pips: 0.00400
    cooling_bars: 3
    min_atr_ratio: 0.8

    # Momentum thresholds
    mom_threshold: 0.8         
    mom_trend_threshold: 0.6

    breakeven_atr: 1.0

  # Signal Quality Gate — v5.0: higher bar
  signal:
    min_gap: 0.50                # v5.0: raised from 0.40 → 0.50
    cooling_bars: 6

# ── Session Windows (broker candle time) ─────────────────────────────────────
sessions:
  asian_start:    "02:00"
  asian_end:      "09:00"
  london_start:   "09:00"
  london_end:     "12:00"
  newyork_start:  "12:00"
  newyork_end:    "21:00"

filters:
  max_spread_pips: 2.0
  min_volatility_percentile: 0.15
  max_volatility_percentile: 0.85

execution:
  order_comment: "HMM Bot"
  slippage_pips: 2
  deviation: 20

# ── Date-Based Backtesting ────────────────────────────────────────────────────
backtest:
  start_date:   "2020-01-24"
  end_date:     "2026-01-01"
  train_split:  0.70
  cache_dir:    "data/cache"
  force_refetch: false

# ── Risk Management — v5.0: tighter controls ─────────────────────────────────
risk:
  risk_per_trade: 0.005          # v5.0: 0.5% risk per trade (was 1%)
  max_daily_drawdown_pct: 0.02   # v5.0: 2% daily max (was 3%)
  max_account_drawdown_pct: 0.15
  max_consecutive_losses: 2      # v5.0: strict 2-loss limit → stop for day
  var_confidence: 0.95

# ── HMM Regime Detection ──────────────────────────────────────────────────────
hmm:
  n_components: 3
  n_iter: 300
  covariance_type: "full"
  confidence_threshold: 0.65
  min_confidence_trade: 0.60
  regime_names:
    0: "mean_reverting"
    1: "trending"
    2: "high_volatility"
  model_path: "models/hmm.pkl"
  feature_lookback: 40000
  retrain_interval: 8000
